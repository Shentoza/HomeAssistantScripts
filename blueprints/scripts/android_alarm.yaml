blueprint:
  name: Set Alarm from Calendar
  domain: script
  author: Shentoza
  description: >-
    Queries configurable calendars, finds the next upcoming event and sets
    an alarm on the target device at the event's start time (minus an optional
    offset). Can be instantiated separately for multiple people and devices.

    ⚠️ Android only: This blueprint uses an Android-specific intent
    (android.intent.action.SET_ALARM) via the Home Assistant Companion app
    and will not work on iOS or other platforms.
  source_url: https://github.com/Shentoza/HomeAssistantScripts/blob/main/blueprints/scripts/wecker_stellen.yaml
  input:
    calendar_ids:
      name: Calendars
      description: Which calendars should be checked for the next upcoming event?
      selector:
        entity:
          domain: calendar
          multiple: true
    notify_service:
      name: Notification Service
      description: >-
        The device tracker of the target device. The notify service will be
        derived automatically (e.g. device_tracker.fp5 → notify.mobile_app_fp5).
      selector:
        entity:
          domain: device_tracker
          multiple: false
    alarm_name:
      name: Alarm Name (Fallback)
      description: >-
        The label shown for the alarm in the Android clock app. Used as a
        fallback when the calendar event has no summary. The suffix " -HA"
        is always appended so that alarms can be identified and dismissed
        by the companion dismiss script.
      default: Home Assistant
      selector:
        text:
    offset_minutes:
      name: Offset (Minutes)
      description: How many minutes before the event start should the alarm go off?
      default: 60
      selector:
        number:
          min: 0
          max: 240
          step: 5
          unit_of_measurement: min
    search_duration_hours:
      name: Search Duration (Hours)
      description: >-
        How many hours into the future should be searched for the next event?
      default: 24
      selector:
        number:
          min: 1
          max: 24
          step: 1
          unit_of_measurement: h
    ignore_calendar:
      name: Ignored Calendars (optional)
      description: >-
        These calendars will be excluded from the search when the ignore condition
        below is active. Leave empty to disable this feature.
        ⚠️ These calendars must also be listed in the Calendars input above.
      default: []
      selector:
        entity:
          domain: calendar
          multiple: true
    ignore_condition:
      name: Ignore Condition (optional)
      description: >-
        When this condition is met, the calendars configured above will be ignored.
        Leave empty to disable this feature.
      default: []
      selector:
        condition:
    label_store:
      name: Alarm Label Store (optional)
      description: >-
        Entity ID of an input_text helper where the label of the last set
        alarm is stored. Required if you want to use the companion dismiss
        blueprint. Leave empty to disable.
        Example: input_text.alarm_label_fp5
      default: ""
      selector:
        text:

sequence:
  - alias: Query calendars
    action: calendar.get_events
    target:
      entity_id: !input calendar_ids
    data:
      duration:
        hours: !input search_duration_hours
        minutes: 0
        seconds: 0
    response_variable: next_dates
  - alias: Initialize variables
    variables:
      blueprint_ignore_calendar: !input ignore_calendar
      blueprint_offset: !input offset_minutes
      blueprint_alarm_name: !input alarm_name
      blueprint_notify_service: !input notify_service
      blueprint_label_store: !input label_store
      ignore_active: false
  - alias: Evaluate ignore condition
    choose:
      - conditions: !input ignore_condition
        sequence:
          - variables:
              ignore_active: true
  - alias: Determine earliest event
    variables:
      next_event: >-
        {#
          Collect all upcoming timed events across calendars into a list of
          dicts with 'start' and 'summary', then pick the earliest one.
          ISO 8601: date-only strings are exactly 10 chars (YYYY-MM-DD).
          Timed events are always longer. Using length > 10 is more robust than
          'T' in event.start, which fails if the integration returns a native
          datetime object instead of a string.
        #}
        {% set ns = namespace(events=[]) %}
        {% set now_dt = now() %}
        {% for calendar, data in next_dates.items() %}
          {% if not ((ignore_active | bool) and calendar in blueprint_ignore_calendar) %}
            {% for event in data.events %}
              {% set start_str = event.start | string %}
              {% if start_str | length > 10 %}
                {% set start = start_str | as_datetime %}
                {% if start is not none and start > now_dt %}
                  {% set ns.events = ns.events + [{'start': start_str, 'summary': event.summary | default('')}] %}
                {% endif %}
              {% endif %}
            {% endfor %}
          {% endif %}
        {% endfor %}
        {{ ns.events | sort(attribute='start') | first if ns.events else none }}
      next_start: "{{ next_event.start if next_event else '' }}"
      next_event_summary: "{{ next_event.summary if next_event else '' }}"
      alarm_hour: >-
        {{ '' if next_start == ''
          else ((next_start | as_datetime | as_local) - timedelta(minutes=blueprint_offset | int)).hour }}
      alarm_minute: >-
        {{ '' if next_start == '' 
          else ((next_start | as_datetime | as_local) - timedelta(minutes=blueprint_offset | int)).minute }}
  - alias: Abort if no event found
    condition: template
    value_template: "{{ next_start != '' }}"
  - alias: Build and send alarm intent
    variables:
      derived_notify_service: >-
        {{ blueprint_notify_service | regex_replace('^device_tracker\.', 'notify.mobile_app_') }}
      effective_alarm_name: >-
        {#
          Use the event summary as the alarm label. Truncate to 45 chars to
          leave room for the ' -HA' suffix (total <= 50 chars). Fall back to
          the configured alarm_name input if the event has no summary.
          The ' -HA' suffix is always appended so the companion dismiss script
          can locate the alarm via SEARCH_MODE_LABEL (exact-match).
        #}
        {% set suffix = ' -HA' %}
        {% set base = next_event_summary if next_event_summary else blueprint_alarm_name %}
        {{ base[:45] + suffix }}
      extra_data: >-
        {{ 'android.intent.extra.alarm.HOUR:' + (alarm_hour | string)
          + ',android.intent.extra.alarm.MINUTES:' + (alarm_minute | string)
          + ',android.intent.extra.alarm.SKIP_UI:true'
          + ',android.intent.extra.alarm.MESSAGE:' + effective_alarm_name }}
  - action: "{{ derived_notify_service }}"
    data:
      message: command_activity
      data:
        intent_action: android.intent.action.SET_ALARM
        intent_extras: "{{ extra_data }}"
  - alias: Store alarm label for dismiss script
    if: "{{ blueprint_label_store != '' }}"
    then:
      - action: input_text.set_value
        target:
          entity_id: "{{ blueprint_label_store }}"
        data:
          value: "{{ effective_alarm_name }}"
