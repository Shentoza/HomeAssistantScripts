blueprint:
  name: Dismiss Calendar Alarm (Android)
  domain: script
  author: Shentoza
  description: >-
    Dismisses an alarm on an Android device by searching for its label via
    DISMISS_ALARM + SEARCH_MODE_LABEL.

    Use this together with the "Set Alarm from Calendar" blueprint, which always
    appends " - HA" to the alarm label (e.g. "Arzttermin - HA"). The default
    search value "- HA" will match all alarms created by that blueprint.

    SEARCH_MODE_LABEL matches alarms whose label contains the given phrase,
    so a partial search term like "- HA" is sufficient.

    ⚠️ Android only: Uses android.intent.action.DISMISS_ALARM via the Home
    Assistant Companion app and will not work on iOS or other platforms.
  source_url: https://github.com/Shentoza/HomeAssistantScripts/blob/main/blueprints/scripts/android_alarm_dismiss.yaml
  input:
    notify_service:
      name: Notification Service
      description: >-
        The device tracker of the target device. The notify service will be
        derived automatically (e.g. device_tracker.fp5 -> notify.mobile_app_fp5).
      selector:
        entity:
          domain: device_tracker
          multiple: false
    alarm_label:
      name: Alarm Label to Search
      description: >-
        The phrase to search for in alarm labels. SEARCH_MODE_LABEL matches
        any alarm whose label contains this value, so "- HA" (the default)
        dismisses all alarms created by the calendar alarm blueprint.
      default: "- HA"
      selector:
        text:

sequence:
  - alias: Dismiss alarm by label
    variables:
      blueprint_notify_service: !input notify_service
      blueprint_alarm_label: !input alarm_label
      derived_notify_service: >-
        {{ blueprint_notify_service | regex_replace('^device_tracker\.', 'notify.mobile_app_') }}
      extra_data: >-
        {{ 'android.intent.extra.alarm.SEARCH_MODE:android.intent.extra.alarm.SEARCH_MODE_LABEL'
          + ',android.intent.extra.alarm.MESSAGE:' + blueprint_alarm_label }}
  - action: "{{ derived_notify_service }}"
    data:
      message: command_activity
      data:
        intent_action: android.intent.action.DISMISS_ALARM
        intent_extras: "{{ extra_data }}"
