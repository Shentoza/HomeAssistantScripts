blueprint:
  name: Dismiss Calendar Alarm (Android)
  domain: script
  author: Shentoza
  description: >-
    Dismisses an alarm on an Android device by reading the exact label from
    an input_text helper and passing it to DISMISS_ALARM + SEARCH_MODE_LABEL.

    Use this together with the "Set Alarm from Calendar" blueprint. Configure
    the same input_text helper in both blueprints -- the set blueprint writes
    the label after every alarm, the dismiss blueprint reads it back.

    ⚠️ Android only: Uses android.intent.action.DISMISS_ALARM via the Home
    Assistant Companion app and will not work on iOS or other platforms.
  source_url: https://github.com/Shentoza/HomeAssistantScripts/blob/main/blueprints/scripts/android_alarm_dismiss.yaml
  input:
    notify_service:
      name: Notification Service
      description: >-
        The device tracker of the target device. The notify service will be
        derived automatically (e.g. device_tracker.fp5 -> notify.mobile_app_fp5).
      selector:
        entity:
          domain: device_tracker
          multiple: false
    alarm_name:
      name: Alarm Name
      description: >-
        The fixed label of the alarm to dismiss. Must match exactly the name
        configured in the "Set Alarm from Calendar" blueprint.
      default: Home Assistant
      selector:
        text:

sequence:
  - alias: Dismiss alarm by label
    variables:
      blueprint_notify_service: !input notify_service
      blueprint_alarm_name: !input alarm_name
      derived_notify_service: >-
        {{ blueprint_notify_service | regex_replace('^device_tracker\.', 'notify.mobile_app_') }}
      extra_data: >-
        {{ 'android.intent.extra.alarm.SEARCH_MODE:android.intent.extra.alarm.SEARCH_MODE_LABEL'
          + ',android.intent.extra.alarm.MESSAGE:' + blueprint_alarm_name }}
  - action: "{{ derived_notify_service }}"
    data:
      message: command_activity
      data:
        intent_action: android.intent.action.DISMISS_ALARM
        intent_extras: "{{ extra_data }}"
